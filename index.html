<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Azul</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Cormorant+Garamond:ital,wght@0,500;0,700;1,500&display=swap" rel="stylesheet">
<style>
  :root {
    /* Authentic Azul tile colors — inspired by Portuguese azulejos */
    --blue: #1b5985;        --blue-d: #0e3a5c;        --blue-hi: #3d87b8;
    --yellow: #d99324;      --yellow-d: #9a6414;      --yellow-hi: #f0b858;
    --red: #962c2c;         --red-d: #621515;         --red-hi: #c44d4d;
    --black: #1e232c;       --black-d: #0b0e13;       --black-hi: #3d4552;
    --cyan: #a8cfd9;        --cyan-d: #6f9ba8;        --cyan-hi: #d6e9ef;

    --accent: #c0392b;
    --gold: #c9a961;
    --gold-d: #8a6f2f;

    /* Parchment & board materials */
    --parchment: #ede0c1;
    --parchment-d: #d4c296;
    --parchment-sh: #a88f5a;
    --wood: #6b4423;
    --wood-d: #3e2616;
    --ink: #2a1a0f;

    --bg: #1a2838;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { min-height: 100vh; }
  body {
    font-family: 'Cormorant Garamond', 'Georgia', serif;
    color: #e8dcc0;
    overflow-x: hidden;
    background-color: #0e1a26;
    background-image:
      radial-gradient(ellipse at top, rgba(60,90,130,.25), transparent 60%),
      radial-gradient(ellipse at bottom, rgba(20,40,70,.4), transparent 50%);
  }

  /* ===== TILES — Ceramic Portuguese azulejos ===== */
  .t {
    width: 40px; height: 40px;
    border-radius: 5px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform .15s ease, box-shadow .15s ease;
    font-size: 16px;
    position: relative;
    user-select: none;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.3),
      inset 0 -2px 2px rgba(0,0,0,.25),
      0 2px 3px rgba(0,0,0,.35);
    overflow: hidden;
  }
  .t::after {
    /* Moorish pattern */
    content: "";
    position: absolute;
    inset: 3px;
    background-repeat: no-repeat;
    background-position: center;
    background-size: 85%;
    opacity: .55;
  }
  .t:hover { transform: scale(1.1); z-index: 2; box-shadow: inset 0 1px 0 rgba(255,255,255,.3), 0 4px 10px rgba(0,0,0,.5); }

  /* BLUE — deep cobalt with 8-point star */
  .t-blue { background: radial-gradient(ellipse at 30% 20%, var(--blue-hi) 0%, var(--blue) 45%, var(--blue-d) 100%); }
  .t-blue::after { background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'><g fill='none' stroke='%23ffffff' stroke-width='1.5' opacity='0.85'><path d='M20 4 L24 16 L36 20 L24 24 L20 36 L16 24 L4 20 L16 16 Z'/><circle cx='20' cy='20' r='3' fill='%23ffffff' opacity='0.6'/></g></svg>"); }

  /* YELLOW — ochre with flower medallion */
  .t-yellow { background: radial-gradient(ellipse at 30% 20%, var(--yellow-hi) 0%, var(--yellow) 45%, var(--yellow-d) 100%); }
  .t-yellow::after { background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'><g fill='%23ffffff' stroke='%23ffffff' stroke-width='1' opacity='0.75'><circle cx='20' cy='20' r='3'/><ellipse cx='20' cy='8' rx='2.5' ry='5'/><ellipse cx='20' cy='32' rx='2.5' ry='5'/><ellipse cx='8' cy='20' rx='5' ry='2.5'/><ellipse cx='32' cy='20' rx='5' ry='2.5'/><circle cx='11' cy='11' r='2'/><circle cx='29' cy='11' r='2'/><circle cx='11' cy='29' r='2'/><circle cx='29' cy='29' r='2'/></g></svg>"); }

  /* RED — crimson with Moorish rosette */
  .t-red { background: radial-gradient(ellipse at 30% 20%, var(--red-hi) 0%, var(--red) 45%, var(--red-d) 100%); }
  .t-red::after { background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'><g fill='none' stroke='%23ffffff' stroke-width='1.3' opacity='0.8'><circle cx='20' cy='20' r='6'/><circle cx='20' cy='20' r='10'/><path d='M20 4 L20 36 M4 20 L36 20 M8 8 L32 32 M32 8 L8 32'/><circle cx='20' cy='20' r='2' fill='%23ffffff'/></g></svg>"); }

  /* BLACK — obsidian with geometric interlace */
  .t-black { background: radial-gradient(ellipse at 30% 20%, var(--black-hi) 0%, var(--black) 45%, var(--black-d) 100%); }
  .t-black::after { background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'><g fill='none' stroke='%23d4c296' stroke-width='1.3' opacity='0.85'><path d='M20 4 L32 12 L32 28 L20 36 L8 28 L8 12 Z'/><path d='M20 10 L27 15 L27 25 L20 30 L13 25 L13 15 Z'/><circle cx='20' cy='20' r='2.5' fill='%23d4c296'/></g></svg>"); }

  /* CYAN (ice/white azulejo) — pale blue with delicate swirl */
  .t-cyan { background: radial-gradient(ellipse at 30% 20%, var(--cyan-hi) 0%, var(--cyan) 45%, var(--cyan-d) 100%); }
  .t-cyan::after { background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'><g fill='none' stroke='%231b5985' stroke-width='1.2' opacity='0.7'><path d='M20 6 Q28 12 28 20 Q28 28 20 34 Q12 28 12 20 Q12 12 20 6 Z'/><path d='M20 12 Q24 16 24 20 Q24 24 20 28 Q16 24 16 20 Q16 16 20 12 Z'/><circle cx='20' cy='20' r='1.5' fill='%231b5985'/></g></svg>"); }

  /* First-player marker */
  .t-first {
    background: radial-gradient(ellipse at 30% 20%, #fdf6e3 0%, #ede0c1 50%, #c9b079 100%);
    color: var(--ink);
    font-family: 'Cinzel', serif;
    font-weight: 800;
    font-size: 11px;
    letter-spacing: .5px;
  }
  .t-first::before { background: linear-gradient(135deg, rgba(255,255,255,.4) 0%, transparent 50%); }
  .t-first::after { display: none; }

  /* First-player token on floor shows a small penalty badge */
  .floor-slot.filled .t-first::before {
    content: "\2212 1";
    position: absolute;
    bottom: -4px;
    right: -4px;
    background: var(--accent);
    color: #fff;
    font-size: 9px;
    font-weight: 700;
    padding: 1px 4px;
    border-radius: 6px;
    line-height: 1;
    border: 1px solid #fff;
    box-shadow: 0 1px 2px rgba(0,0,0,.4);
  }

  .t.highlight { box-shadow: 0 0 0 3px #fff, 0 0 22px rgba(255,230,150,.7); transform: scale(1.15); z-index: 3; }

  /* ===== HEADER — Ornate title card ===== */
  #header {
    text-align: center;
    padding: 12px 12px 10px;
    background:
      linear-gradient(180deg, rgba(0,0,0,.35), rgba(0,0,0,.1)),
      linear-gradient(135deg, #1b3a5c 0%, #0e2338 50%, #1b3a5c 100%);
    border-bottom: 3px solid var(--gold-d);
    position: relative;
    box-shadow: 0 4px 20px rgba(0,0,0,.4);
  }
  #header::before, #header::after {
    content: "";
    position: absolute;
    left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent 0%, var(--gold) 20%, var(--gold-d) 50%, var(--gold) 80%, transparent 100%);
  }
  #header::before { top: 0; }
  #header::after { bottom: 3px; }
  #header h1 {
    font-family: 'Cinzel', serif;
    font-size: 30px;
    letter-spacing: 14px;
    color: var(--gold);
    text-transform: uppercase;
    font-weight: 900;
    text-shadow: 0 2px 4px rgba(0,0,0,.6), 0 0 20px rgba(201,169,97,.3);
    padding-left: 14px;
  }
  #status-bar { display: flex; align-items: center; justify-content: center; gap: 12px; margin-top: 4px; min-height: 28px; }
  #status { font-size: 15px; color: #e8dcc0; font-style: italic; }
  #status b { font-style: normal; font-weight: 700; }
  #status .step-num { display: inline-flex; width: 22px; height: 22px; border-radius: 50%; background: var(--gold); color: var(--ink); font-size: 12px; font-weight: 700; font-family: 'Cinzel', serif; align-items: center; justify-content: center; margin-right: 6px; font-style: normal; box-shadow: 0 1px 3px rgba(0,0,0,.4); }
  #undo-btn { display: none; padding: 4px 14px; border-radius: 6px; border: 1px solid var(--gold-d); background: rgba(0,0,0,.25); color: var(--gold); font-size: 12px; cursor: pointer; transition: .15s; font-family: 'Cinzel', serif; letter-spacing: 1px; }
  #undo-btn:hover { background: rgba(201,169,97,.15); }
  .header-btns { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); display: flex; gap: 8px; }
  .icon-btn { background: rgba(0,0,0,.25); border: 1px solid var(--gold-d); color: var(--gold); width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: .15s; font-family: 'Cinzel', serif; font-weight: 700; }
  .icon-btn:hover { background: rgba(201,169,97,.2); color: #fff; }
  .icon-btn.on { background: rgba(201,169,97,.35); color: #fff; box-shadow: inset 0 0 0 1px var(--gold); }

  /* ===== AUDIO MENU ===== */
  #audio-menu {
    position: absolute;
    top: 56px;
    right: 16px;
    width: 260px;
    background: radial-gradient(ellipse at 30% 20%, #f5ebcf 0%, var(--parchment) 50%, var(--parchment-d) 100%);
    color: var(--ink);
    border-radius: 10px;
    padding: 14px 18px;
    box-shadow: 0 0 0 3px var(--wood), 0 0 0 5px var(--wood-d), 0 0 0 6px var(--gold), 0 12px 30px rgba(0,0,0,.6);
    z-index: 90;
    display: none;
    font-family: 'Cinzel', serif;
    animation: fadeIn .2s ease;
  }
  #audio-menu.show { display: block; }
  #audio-menu .am-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; font-size: 13px; letter-spacing: 1px; }
  #audio-menu .am-row label { color: var(--wood-d); }
  #audio-menu .am-divider { height: 1px; background: linear-gradient(90deg, transparent, var(--parchment-sh), transparent); margin: 10px 0; }
  #audio-menu .am-label { font-size: 10px; letter-spacing: 3px; color: var(--wood-d); opacity: .7; text-transform: uppercase; margin-bottom: 6px; }
  #audio-menu .am-tracks { display: flex; flex-direction: column; gap: 4px; }
  #audio-menu .am-track {
    padding: 6px 10px;
    border: 1px solid var(--parchment-sh);
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    color: var(--ink);
    background: rgba(255,255,255,.3);
    transition: .15s;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  #audio-menu .am-track:hover { background: rgba(201,169,97,.2); }
  #audio-menu .am-track.active { background: linear-gradient(180deg, #ffe9a8 0%, var(--gold) 100%); border-color: var(--gold-d); color: var(--ink); }
  #audio-menu .am-track .am-composer { font-size: 10px; font-style: italic; opacity: .7; }
  #audio-menu .am-track.active .am-composer { opacity: .9; }

  /* Toggle switch */
  .am-switch {
    width: 36px; height: 20px;
    background: rgba(139,90,43,.3);
    border-radius: 10px;
    position: relative;
    cursor: pointer;
    transition: background .15s;
    border: 1px solid var(--parchment-sh);
  }
  .am-switch span {
    position: absolute;
    top: 2px; left: 2px;
    width: 14px; height: 14px;
    background: #fff;
    border-radius: 50%;
    transition: transform .2s cubic-bezier(.3,.8,.5,1.3), background .15s;
    box-shadow: 0 1px 2px rgba(0,0,0,.3);
  }
  .am-switch.on { background: var(--gold); }
  .am-switch.on span { transform: translateX(16px); }

  #audio-menu input[type=range] {
    width: 140px;
    accent-color: var(--gold-d);
  }

  /* Segmented speed control */
  .am-speed { display: flex; gap: 4px; background: rgba(139,90,43,.15); border: 1px solid var(--parchment-sh); border-radius: 8px; padding: 3px; }
  .am-speed-btn {
    flex: 1;
    padding: 5px 8px;
    background: transparent;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--wood-d);
    transition: .15s;
  }
  .am-speed-btn:hover { background: rgba(201,169,97,.2); }
  .am-speed-btn.active {
    background: linear-gradient(180deg, #ffe9a8 0%, var(--gold) 100%);
    color: var(--ink);
    box-shadow: inset 0 -1px 2px rgba(139,90,43,.3), 0 1px 2px rgba(0,0,0,.1);
    font-weight: 700;
  }

  /* ===== FACTORIES — Blue & white porcelain plates ===== */
  #factories-section { text-align: center; margin-bottom: 4px; }
  #factories-section .section-label {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 5px;
    color: var(--gold);
    margin-bottom: 14px;
    opacity: .8;
  }
  #factories-area { display: flex; flex-wrap: wrap; gap: 18px; justify-content: center; align-items: flex-start; }

  .factory {
    width: 118px; height: 118px;
    border-radius: 50%;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    place-items: center;
    gap: 4px;
    padding: 20px;
    transition: box-shadow .2s, transform .2s;
    position: relative;
    background: radial-gradient(circle at 35% 30%, #fdfcf4 0%, #f0ead3 40%, #c9b079 100%);
    box-shadow:
      inset 0 0 0 4px #8a6f2f,
      0 4px 10px rgba(0,0,0,.45);
  }
  .factory::before {
    /* Decorative porcelain rim */
    content: "";
    position: absolute;
    inset: 8px;
    border-radius: 50%;
    border: 1px dashed rgba(27,89,133,.35);
    pointer-events: none;
  }
  .factory::after {
    content: attr(data-num);
    position: absolute;
    bottom: -22px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    color: var(--gold-d);
    font-family: 'Cinzel', serif;
    letter-spacing: 2px;
  }
  .factory:hover { transform: translateY(-2px); }
  .factory.glow {
    box-shadow:
      inset 0 0 0 4px var(--gold),
      0 4px 14px rgba(0,0,0,.5),
      0 0 20px rgba(201,169,97,.5);
  }
  .factory .t { width: 34px; height: 34px; position: relative; z-index: 1; }
  .factory.empty { opacity: .35; filter: grayscale(.6); }

  #center-pool {
    min-width: 120px;
    min-height: 80px;
    background: radial-gradient(ellipse, rgba(40,60,90,.8) 0%, rgba(20,35,55,.9) 100%);
    border: 2px solid var(--gold-d);
    border-radius: 18px;
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    padding: 14px 16px;
    justify-content: center;
    align-items: center;
    max-width: 340px;
    position: relative;
    transition: box-shadow .2s;
    box-shadow: inset 0 2px 8px rgba(0,0,0,.5), 0 2px 6px rgba(0,0,0,.3);
  }
  #center-pool::before {
    content: "TABLE CENTER";
    position: absolute;
    top: -9px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--gold);
    background: var(--bg);
    padding: 0 8px;
  }
  #center-pool.glow {
    border-color: var(--gold);
    box-shadow: inset 0 2px 8px rgba(0,0,0,.5), 0 0 18px rgba(201,169,97,.4);
  }
  #center-pool .t { width: 34px; height: 34px; }

  /* ===== PLAYER BOARDS — Parchment with wooden frame ===== */
  #boards { display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; }
  .player-board {
    padding: 18px 20px 16px;
    min-width: 460px;
    transition: box-shadow .2s;
    border-radius: 10px;
    position: relative;
    background: radial-gradient(ellipse at 30% 20%, #f5ebcf 0%, var(--parchment) 50%, var(--parchment-d) 100%);
    color: var(--ink);
    box-shadow:
      0 0 0 4px var(--wood),
      0 0 0 6px var(--wood-d),
      0 0 0 7px var(--gold-d),
      inset 0 0 30px rgba(139,90,43,.12),
      0 8px 22px rgba(0,0,0,.45);
  }
  .player-board.active { box-shadow: 0 0 0 4px var(--wood), 0 0 0 6px var(--wood-d), 0 0 0 7px var(--gold), inset 0 0 30px rgba(139,90,43,.15), inset 0 0 0 1px rgba(168,143,90,.3), 0 8px 28px rgba(201,169,97,.35), 0 3px 8px rgba(0,0,0,.3); }
  .player-board.inactive { opacity: .78; filter: saturate(.85); }

  .player-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--parchment-sh);
    position: relative;
  }
  .player-header::after {
    content: "";
    position: absolute;
    bottom: -2px;
    left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-d), transparent);
  }
  .player-name {
    font-family: 'Cinzel', serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--ink);
    display: flex;
    align-items: center;
    gap: 8px;
    letter-spacing: 1px;
  }
  .player-name .turn-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); display: inline-block; animation: pulse 1.5s infinite; box-shadow: 0 0 8px var(--accent); }
  .player-score {
    font-family: 'Cinzel', serif;
    font-size: 24px;
    font-weight: 900;
    color: var(--wood-d);
    background: radial-gradient(ellipse, #fdf6e3 0%, #e8d9ae 100%);
    padding: 4px 18px;
    border-radius: 20px;
    min-width: 64px;
    text-align: center;
    transition: .3s;
    border: 2px solid var(--gold-d);
    box-shadow: inset 0 1px 2px rgba(255,255,255,.5), inset 0 -1px 3px rgba(139,90,43,.2), 0 2px 4px rgba(0,0,0,.2);
  }
  .player-score.pop { animation: popScore .45s ease; }
  @keyframes popScore { 50% { transform: scale(1.25); color: var(--accent); } }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .3; } }

  .board-content { display: flex; gap: 8px; align-items: flex-start; position: relative; }

  /* Pattern lines — Etched into parchment */
  .pattern-lines { display: flex; flex-direction: column; gap: 4px; padding: 6px; border-radius: 6px; background: rgba(139,90,43,.06); border: 1px solid rgba(139,90,43,.15); }
  .p-row {
    display: flex;
    justify-content: flex-end;
    gap: 3px;
    height: 40px;
    padding: 0 3px;
    border-radius: 4px;
    transition: .15s;
    cursor: default;
    position: relative;
  }
  .p-row.can-place { cursor: pointer; background: rgba(201,169,97,.18); box-shadow: inset 0 0 0 1px var(--gold); }
  .p-row.can-place:hover { background: rgba(201,169,97,.35); }
  .p-row.can-place::before { content: "\2190  place here"; position: absolute; left: -86px; top: 50%; transform: translateY(-50%); font-size: 10px; color: var(--wood-d); font-family: 'Cinzel', serif; letter-spacing: 1px; font-weight: 700; white-space: nowrap; pointer-events: none; }
  .p-row.cant-place { cursor: not-allowed; opacity: .45; }

  .p-slot {
    width: 40px; height: 40px;
    border-radius: 5px;
    background:
      linear-gradient(135deg, rgba(139,90,43,.15) 0%, rgba(168,143,90,.25) 100%);
    box-shadow:
      inset 0 2px 3px rgba(139,90,43,.4),
      inset 0 -1px 1px rgba(255,255,255,.3);
  }
  .p-slot.filled { background: none; box-shadow: none; padding: 0; }
  .p-slot.filled > .t { width: 100%; height: 100%; cursor: default; }
  .p-slot.preview {
    background: none;
    box-shadow: inset 0 0 0 2px var(--accent);
    opacity: .55;
    animation: previewPulse 1.2s ease-in-out infinite;
  }
  @keyframes previewPulse { 0%,100% { opacity: .45; } 50% { opacity: .75; } }

  /* Arrow col */
  .arrow-col { display: flex; flex-direction: column; gap: 4px; color: var(--wood); font-size: 18px; font-weight: 700; }
  .arrow-col span { height: 40px; display: flex; align-items: center; justify-content: center; opacity: .4; }
  .arrow-col span.ready { color: var(--accent); opacity: 1; animation: pulse 1s infinite; text-shadow: 0 0 6px var(--accent); }

  /* Wall — Embossed mosaic grid */
  .wall {
    display: flex;
    flex-direction: column;
    gap: 4px;
    padding: 6px;
    border-radius: 6px;
    background: rgba(139,90,43,.06);
    border: 1px solid rgba(139,90,43,.15);
  }
  .wall-row { display: flex; gap: 3px; }
  .w-slot {
    width: 40px; height: 40px;
    border-radius: 5px;
    position: relative;
    overflow: hidden;
    box-shadow:
      inset 0 2px 3px rgba(139,90,43,.35),
      inset 0 -1px 1px rgba(255,255,255,.25);
  }
  .w-slot::before {
    /* Faded mosaic color hint */
    content: "";
    position: absolute;
    inset: 3px;
    border-radius: 3px;
    opacity: .2;
  }
  .w-slot.w-blue::before { background: var(--blue); }
  .w-slot.w-yellow::before { background: var(--yellow); }
  .w-slot.w-red::before { background: var(--red); }
  .w-slot.w-black::before { background: var(--black); }
  .w-slot.w-cyan::before { background: var(--cyan-d); }
  .w-slot.placed { box-shadow: inset 0 0 0 1px rgba(0,0,0,.2), 0 2px 4px rgba(0,0,0,.3); }
  .w-slot.placed::before { display: none; }
  .w-slot.placed > .t { position: absolute; inset: 0; width: 100%; height: 100%; cursor: default; }
  .w-slot.placed.new-tile { animation: wallPop .5s ease; }
  @keyframes wallPop { 0% { transform: scale(0) rotate(180deg); opacity: 0; } 100% { transform: scale(1) rotate(0); opacity: 1; } }

  /* ===== SCORING ANIMATIONS ===== */
  .player-board.scoring-focus {
    box-shadow:
      0 0 0 4px var(--wood),
      0 0 0 6px var(--wood-d),
      0 0 0 7px var(--gold),
      inset 0 0 30px rgba(139,90,43,.12),
      0 0 60px rgba(201,169,97,.6),
      0 8px 22px rgba(0,0,0,.45);
    transform: scale(1.01);
  }
  .player-board.scoring-dim { opacity: .45; filter: saturate(.7); transform: scale(.98); }
  .player-board { transition: box-shadow .35s, opacity .35s, transform .35s, filter .35s; }

  /* Scoring tile — glows with a pulsing gold aura */
  .w-slot.scoring {
    z-index: 5;
    animation: scoringPulse 1.2s ease;
  }
  @keyframes scoringPulse {
    0% { box-shadow: 0 0 0 0 rgba(255,215,120,.95), 0 2px 4px rgba(0,0,0,.3); }
    60% { box-shadow: 0 0 0 14px rgba(255,215,120,0), 0 2px 4px rgba(0,0,0,.3); }
    100% { box-shadow: inset 0 0 0 1px rgba(0,0,0,.2), 0 2px 4px rgba(0,0,0,.3); }
  }

  /* Adjacency chain — glowing gold connection */
  .w-slot.adj-chain {
    animation: adjChain 1s ease;
    position: relative;
    z-index: 4;
  }
  @keyframes adjChain {
    0% { filter: brightness(1); }
    30% { filter: brightness(1.35) drop-shadow(0 0 10px #ffd87a); }
    100% { filter: brightness(1); }
  }

  /* Chain SVG overlay */
  .chain-overlay {
    position: fixed;
    pointer-events: none;
    z-index: 60;
    overflow: visible;
  }
  .chain-overlay line {
    stroke: #ffd87a;
    stroke-width: 4;
    stroke-linecap: round;
    filter: drop-shadow(0 0 6px #ffd87a) drop-shadow(0 0 12px rgba(255,215,120,.6));
    stroke-dasharray: 200;
    stroke-dashoffset: 200;
    animation: drawChain .5s ease forwards;
  }
  @keyframes drawChain {
    to { stroke-dashoffset: 0; }
  }

  /* Running total ticker above scoring tile */
  .tally-ticker {
    position: fixed;
    font-family: 'Cinzel', serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--ink);
    background: linear-gradient(180deg, #ffe9a8 0%, var(--gold) 100%);
    border: 2px solid var(--gold-d);
    border-radius: 14px;
    padding: 3px 12px;
    pointer-events: none;
    z-index: 260;
    box-shadow: 0 3px 10px rgba(0,0,0,.5);
    white-space: nowrap;
    animation: tallyIn .25s ease, tallyOut .4s ease 1.2s forwards;
  }
  @keyframes tallyIn { 0% { transform: translate(-50%, 20%) scale(.5); opacity: 0; } 100% { transform: translate(-50%, -130%) scale(1); opacity: 1; } }
  @keyframes tallyOut { to { transform: translate(-50%, -200%) scale(.9); opacity: 0; } }

  /* Flying tile for pattern -> wall migration */
  .fly-tile {
    position: fixed;
    z-index: 80;
    pointer-events: none;
    transition: transform .55s cubic-bezier(.5,-.2,.3,1.3), filter .55s ease;
    will-change: transform;
  }

  /* Floor tile being flicked off */
  .floor-slot.flicking > .t {
    animation: flickOff .55s cubic-bezier(.4,0,.8,.5) forwards;
    z-index: 5;
  }
  @keyframes flickOff {
    0% { transform: translateY(0) rotate(0); opacity: 1; }
    100% { transform: translateY(90px) rotate(25deg); opacity: 0; }
  }

  /* Floating point popup */
  .points-pop {
    position: fixed;
    font-family: 'Cinzel', serif;
    font-size: 28px;
    font-weight: 900;
    pointer-events: none;
    z-index: 250;
    text-shadow: 0 2px 6px rgba(0,0,0,.8), 0 0 16px currentColor;
    animation: pointsFloat 1.3s cubic-bezier(.2,.7,.3,1) forwards;
    white-space: nowrap;
  }
  .points-pop.pos { color: #ffd87a; }
  .points-pop.neg { color: #ff6b7a; }
  .points-pop.small { font-size: 18px; }
  @keyframes pointsFloat {
    0% { transform: translate(-50%, -50%) scale(.3); opacity: 0; }
    20% { transform: translate(-50%, -70%) scale(1.4); opacity: 1; }
    55% { transform: translate(-50%, -115%) scale(1); opacity: 1; }
    100% { transform: translate(-50%, -180%) scale(.85); opacity: 0; }
  }

  /* Row/column complete celebration */
  .line-complete {
    position: fixed;
    font-family: 'Cinzel', serif;
    font-size: 15px;
    font-weight: 900;
    letter-spacing: 3px;
    color: #fff;
    background: linear-gradient(90deg, var(--accent), #ff8c5a);
    border: 2px solid #fff;
    border-radius: 20px;
    padding: 4px 14px;
    pointer-events: none;
    z-index: 270;
    text-transform: uppercase;
    text-shadow: 0 1px 2px rgba(0,0,0,.5);
    box-shadow: 0 0 20px rgba(255,140,90,.8), 0 4px 12px rgba(0,0,0,.5);
    animation: lineCompleteAnim 1.8s ease forwards;
  }
  @keyframes lineCompleteAnim {
    0% { transform: translate(-50%, 0) scale(0) rotate(-10deg); opacity: 0; }
    15% { transform: translate(-50%, -40px) scale(1.3) rotate(5deg); opacity: 1; }
    30% { transform: translate(-50%, -40px) scale(1) rotate(0); }
    80% { transform: translate(-50%, -40px) scale(1); opacity: 1; }
    100% { transform: translate(-50%, -80px) scale(.9); opacity: 0; }
  }

  /* Banner */
  #scoring-banner {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: radial-gradient(ellipse, #f5ebcf 0%, var(--parchment) 50%, var(--parchment-d) 100%);
    color: var(--wood-d);
    font-family: 'Cinzel', serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    padding: 18px 44px;
    border-radius: 10px;
    box-shadow: 0 0 0 4px var(--wood), 0 0 0 6px var(--wood-d), 0 0 0 7px var(--gold), 0 14px 40px rgba(0,0,0,.6);
    z-index: 180;
    display: none;
    text-align: center;
  }
  #scoring-banner.show { display: block; animation: bannerInOut 1.5s ease forwards; }
  #scoring-banner .banner-sub { display: block; font-size: 13px; letter-spacing: 2px; opacity: .7; margin-top: 4px; font-style: italic; text-transform: none; }
  @keyframes bannerInOut {
    0% { transform: translate(-50%, -50%) scale(.6); opacity: 0; }
    20% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    80% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(1.05); opacity: 0; }
  }
  #scoring-banner.sticky { animation: bannerIn .35s ease forwards; }
  @keyframes bannerIn {
    0% { transform: translate(-50%, -50%) scale(.6); opacity: 0; }
    100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
  }

  /* Floor */
  .floor-area { margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--parchment-sh); position: relative; }
  .floor-area::before {
    content: "";
    position: absolute;
    top: -2px;
    left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-d), transparent);
  }
  .floor-header { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .floor-label { font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 3px; color: var(--wood-d); text-transform: uppercase; font-weight: 700; }
  .floor-click { font-size: 11px; color: var(--accent); cursor: pointer; display: none; font-style: italic; font-weight: 700; }
  .floor-click:hover { text-decoration: underline; }
  .floor-penalties { display: flex; gap: 3px; margin-bottom: 3px; }
  .floor-penalties span {
    width: 36px;
    text-align: center;
    font-family: 'Cinzel', serif;
    font-size: 11px;
    font-weight: 700;
    color: var(--red-d);
  }
  .floor-line { display: flex; gap: 3px; }
  .floor-slot {
    width: 36px; height: 36px;
    border-radius: 4px;
    background: linear-gradient(135deg, rgba(139,90,43,.12) 0%, rgba(168,143,90,.2) 100%);
    box-shadow: inset 0 2px 2px rgba(139,90,43,.3);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: .15s;
  }
  .floor-slot.filled { background: none; box-shadow: none; }
  .floor-slot.filled > .t { width: 100%; height: 100%; cursor: default; }
  .floor-line.can-drop { cursor: pointer; }
  .floor-line.can-drop .floor-slot:not(.filled) { box-shadow: inset 0 0 0 2px var(--accent); background: rgba(192,57,43,.1); }

  /* ===== BUTTONS ===== */
  .btn {
    padding: 10px 28px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    transition: .2s;
    font-weight: 700;
    letter-spacing: 2px;
    font-family: 'Cinzel', serif;
    text-transform: uppercase;
  }
  .btn-primary {
    background: linear-gradient(180deg, #d4a857 0%, var(--gold) 50%, #8a6f2f 100%);
    color: var(--ink);
    border: 1px solid var(--gold-d);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.4), inset 0 -1px 0 rgba(0,0,0,.2), 0 3px 8px rgba(0,0,0,.4);
  }
  .btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); box-shadow: inset 0 1px 0 rgba(255,255,255,.4), 0 5px 14px rgba(201,169,97,.4); }
  .btn-ghost {
    background: rgba(0,0,0,.25);
    color: var(--gold);
    border: 1px solid var(--gold-d);
  }
  .btn-ghost:hover { background: rgba(201,169,97,.15); color: #fff; }
  .btn-sm { padding: 6px 18px; font-size: 12px; }

  #controls { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 10px; }

  /* ===== GAME OVER ===== */
  #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.8); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(6px); }
  #overlay.show { display: flex; }
  #overlay-content {
    background:
      radial-gradient(ellipse at 30% 20%, #f5ebcf 0%, var(--parchment) 50%, var(--parchment-d) 100%);
    color: var(--ink);
    border-radius: 12px;
    padding: 40px 48px;
    text-align: center;
    max-width: 460px;
    animation: fadeIn .4s ease;
    box-shadow: 0 0 0 4px var(--wood), 0 0 0 6px var(--wood-d), 0 0 0 7px var(--gold), 0 20px 60px rgba(0,0,0,.6);
  }
  #overlay-content h2 { font-family: 'Cinzel', serif; font-size: 32px; color: var(--wood-d); margin-bottom: 20px; letter-spacing: 3px; }
  #overlay-content .scores-list { text-align: left; margin: 0 auto 24px; display: inline-block; min-width: 260px; }
  #overlay-content .score-row { display: flex; justify-content: space-between; gap: 40px; padding: 8px 12px; border-bottom: 1px solid var(--parchment-sh); font-size: 16px; font-family: 'Cinzel', serif; }
  #overlay-content .score-row:first-child { color: var(--wood-d); font-weight: 700; background: rgba(201,169,97,.2); border-radius: 6px; }
  #overlay-content .score-row .pts { font-weight: 700; }
  .bonus-details { font-size: 12px; color: var(--wood); font-style: italic; margin-bottom: 18px; }

  /* ===== SETUP ===== */
  #setup { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 75vh; gap: 26px; animation: fadeIn .5s ease; padding: 20px; }
  #setup h2 {
    font-family: 'Cinzel', serif;
    font-size: 48px;
    color: var(--gold);
    letter-spacing: 18px;
    text-transform: uppercase;
    font-weight: 900;
    padding-left: 18px;
    text-shadow: 0 4px 12px rgba(0,0,0,.6), 0 0 30px rgba(201,169,97,.3);
  }
  #setup .subtitle { color: #b0a07a; font-size: 16px; margin-top: -20px; font-style: italic; letter-spacing: 2px; }
  .setup-cards { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
  .setup-card {
    background:
      linear-gradient(180deg, rgba(0,0,0,.2), rgba(0,0,0,.4)),
      radial-gradient(ellipse at 30% 20%, rgba(201,169,97,.15), transparent);
    border: 2px solid var(--gold-d);
    border-radius: 10px;
    padding: 20px 28px;
    cursor: pointer;
    transition: .2s;
    text-align: center;
    min-width: 140px;
    box-shadow: inset 0 1px 0 rgba(201,169,97,.2), 0 3px 8px rgba(0,0,0,.3);
  }
  .setup-card:hover { border-color: var(--gold); transform: translateY(-3px); box-shadow: 0 6px 16px rgba(0,0,0,.4); }
  .setup-card.sel {
    border-color: var(--gold);
    background: linear-gradient(180deg, rgba(201,169,97,.25), rgba(201,169,97,.1));
    box-shadow: inset 0 1px 0 rgba(255,255,255,.2), 0 0 20px rgba(201,169,97,.3);
  }
  .setup-card .num { font-family: 'Cinzel', serif; font-size: 26px; font-weight: 900; color: var(--gold); }
  .setup-card .desc { font-size: 12px; color: #b0a07a; margin-top: 4px; font-style: italic; }
  .setup-row { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .setup-row label { font-family: 'Cinzel', serif; font-size: 11px; text-transform: uppercase; letter-spacing: 4px; color: var(--gold); opacity: .8; }

  /* ===== TUTORIAL OVERLAY ===== */
  #tutorial-overlay { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.82); backdrop-filter: blur(5px); }
  #tutorial-overlay.show { display: flex; align-items: center; justify-content: center; }
  .tut-card {
    background: radial-gradient(ellipse at 30% 20%, #f5ebcf 0%, var(--parchment) 50%, var(--parchment-d) 100%);
    color: var(--ink);
    border-radius: 10px;
    padding: 30px 36px;
    max-width: 580px;
    width: 90%;
    animation: fadeIn .35s ease;
    position: relative;
    box-shadow: 0 0 0 4px var(--wood), 0 0 0 6px var(--wood-d), 0 0 0 7px var(--gold), 0 20px 50px rgba(0,0,0,.5);
  }
  .tut-card h3 { font-family: 'Cinzel', serif; color: var(--wood-d); font-size: 22px; margin-bottom: 14px; display: flex; align-items: center; gap: 12px; letter-spacing: 2px; }
  .tut-card h3 .tut-step { background: linear-gradient(180deg, var(--gold), #8a6f2f); color: var(--ink); width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 900; box-shadow: inset 0 1px 0 rgba(255,255,255,.4), 0 2px 4px rgba(0,0,0,.3); }
  .tut-card p { font-size: 15px; line-height: 1.7; color: var(--ink); margin-bottom: 12px; }
  .tut-card b { color: var(--wood-d); }
  .tut-card .tut-visual {
    background: rgba(139,90,43,.1);
    border: 1px solid var(--parchment-sh);
    border-radius: 10px;
    padding: 18px;
    margin: 14px 0;
    display: flex;
    gap: 12px;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
  }
  .tut-card .tut-nav { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; }
  .tut-card .tut-dots { display: flex; gap: 6px; }
  .tut-card .tut-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--parchment-sh); transition: .2s; cursor: pointer; }
  .tut-card .tut-dot.active { background: var(--gold-d); transform: scale(1.3); }
  .tut-card .tut-key { display: inline-block; background: rgba(255,255,255,.6); border: 1px solid var(--parchment-sh); border-radius: 4px; padding: 1px 7px; font-size: 11px; color: var(--ink); font-family: 'Cinzel', serif; }

  /* ===== ROUND SUMMARY ===== */
  #round-summary { display: none; position: fixed; inset: 0; z-index: 150; background: rgba(0,0,0,.82); backdrop-filter: blur(5px); align-items: center; justify-content: center; }
  #round-summary.show { display: flex; }
  .summary-card {
    background: radial-gradient(ellipse at 30% 20%, #f5ebcf 0%, var(--parchment) 50%, var(--parchment-d) 100%);
    color: var(--ink);
    border-radius: 10px;
    padding: 28px 36px;
    max-width: 520px;
    width: 90%;
    text-align: center;
    animation: fadeIn .4s ease;
    box-shadow: 0 0 0 4px var(--wood), 0 0 0 6px var(--wood-d), 0 0 0 7px var(--gold), 0 20px 50px rgba(0,0,0,.5);
  }
  .summary-card h3 { font-family: 'Cinzel', serif; color: var(--wood-d); font-size: 24px; margin-bottom: 18px; letter-spacing: 3px; }
  .summary-players { display: flex; flex-direction: column; gap: 8px; margin-bottom: 22px; }
  .summary-p { display: flex; justify-content: space-between; align-items: center; padding: 10px 18px; background: rgba(139,90,43,.08); border: 1px solid var(--parchment-sh); border-radius: 8px; }
  .summary-p .sp-name { font-family: 'Cinzel', serif; font-weight: 700; color: var(--ink); }
  .summary-p .sp-change { font-size: 13px; font-style: italic; }
  .summary-p .sp-change.pos { color: #2d5a2d; }
  .summary-p .sp-change.neg { color: var(--red-d); }
  .summary-p .sp-score { font-family: 'Cinzel', serif; font-size: 22px; font-weight: 900; color: var(--wood-d); }

  /* ===== TOOLTIP ===== */
  .tooltip { position: fixed; z-index: 300; background: var(--parchment); color: var(--ink); border: 1px solid var(--gold-d); border-radius: 6px; padding: 8px 12px; font-size: 12px; pointer-events: none; max-width: 220px; line-height: 1.5; box-shadow: 0 4px 20px rgba(0,0,0,.5); }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  /* Responsive */
  @media (max-width: 1050px) {
    .player-board { min-width: 400px; padding: 14px; }
    .t, .p-slot, .w-slot { width: 34px; height: 34px; }
    .p-row { height: 34px; }
    .arrow-col span { height: 34px; }
    .floor-slot { width: 32px; height: 32px; }
    .floor-penalties span { width: 32px; }
    .p-row.can-place::before { display: none; }
    .factory { width: 108px; height: 108px; }
    .factory .t { width: 30px; height: 30px; }
  }

  /* ===== GAME WRAPPER ===== */
  #game { display: flex; flex-direction: column; align-items: center; padding: 24px 20px 20px; gap: 26px; }
</style>
</head>
<body>

<div id="header">
  <h1>Azul</h1>
  <div id="status-bar">
    <span id="status"></span>
    <button id="undo-btn" onclick="undoPick()">Undo</button>
  </div>
  <div class="header-btns">
    <button class="icon-btn" id="audio-btn" onclick="toggleAudioMenu(event)" title="Audio settings">&#x266A;</button>
    <button class="icon-btn" onclick="showTutorial()" title="How to play">?</button>
    <button class="icon-btn" onclick="restartGame()" title="New game">&#x21bb;</button>
  </div>
  <!-- Audio settings panel -->
  <div id="audio-menu">
    <div class="am-row am-toggle">
      <label>Sound</label>
      <div class="am-switch" id="am-sfx-switch" onclick="toggleSfx()"><span></span></div>
    </div>
    <div class="am-row am-toggle">
      <label>Music</label>
      <div class="am-switch" id="am-music-switch" onclick="toggleMusic()"><span></span></div>
    </div>
    <div class="am-row">
      <label>Volume</label>
      <input type="range" id="am-vol" min="0" max="100" value="50" oninput="setVolume(this.value)">
    </div>
    <div class="am-divider"></div>
    <div class="am-label">Scoring Speed</div>
    <div class="am-speed" id="am-speed">
      <button data-speed="normal" class="am-speed-btn" onclick="setScoringSpeed('normal')">Normal</button>
      <button data-speed="fast" class="am-speed-btn active" onclick="setScoringSpeed('fast')">Fast</button>
      <button data-speed="instant" class="am-speed-btn" onclick="setScoringSpeed('instant')">Instant</button>
    </div>
    <div class="am-divider"></div>
    <div class="am-label">Classical Piece</div>
    <div class="am-tracks" id="am-tracks"></div>
  </div>
</div>

<div id="game">
  <!-- ===== SETUP ===== -->
  <div id="setup">
    <h2>Azul</h2>
    <p class="subtitle">The beautiful tile-laying game</p>

    <div class="setup-row">
      <label>Players</label>
      <div class="setup-cards" id="player-cards">
        <div class="setup-card sel" data-val="2" onclick="selectCard(this,'player-cards')"><div class="num">2</div><div class="desc">5 factories</div></div>
        <div class="setup-card" data-val="3" onclick="selectCard(this,'player-cards')"><div class="num">3</div><div class="desc">7 factories</div></div>
        <div class="setup-card" data-val="4" onclick="selectCard(this,'player-cards')"><div class="num">4</div><div class="desc">9 factories</div></div>
      </div>
    </div>

    <div class="setup-row">
      <label>Mode</label>
      <div class="setup-cards" id="mode-cards">
        <div class="setup-card sel" data-val="ai" onclick="selectCard(this,'mode-cards')"><div class="num">vs AI</div><div class="desc">Play solo</div></div>
        <div class="setup-card" data-val="human" onclick="selectCard(this,'mode-cards')"><div class="num">Hot Seat</div><div class="desc">Pass & play</div></div>
      </div>
    </div>

    <div class="setup-row" id="difficulty-row">
      <label>AI Difficulty</label>
      <div class="setup-cards" id="diff-cards">
        <div class="setup-card" data-val="easy" onclick="selectCard(this,'diff-cards')"><div class="num">Easy</div><div class="desc">Greedy</div></div>
        <div class="setup-card sel" data-val="medium" onclick="selectCard(this,'diff-cards')"><div class="num">Medium</div><div class="desc">Strategic</div></div>
        <div class="setup-card" data-val="hard" onclick="selectCard(this,'diff-cards')"><div class="num">Hard</div><div class="desc">Lookahead</div></div>
      </div>
    </div>
