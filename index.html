<script>
// ============ AUDIO ENGINE ============
const Snd = (() => {
  let ctx = null, masterGain = null, musicGain = null, sfxGain = null;
  let musicEnabled = false, sfxEnabled = true, volume = 0.5;
  let currentTrackIdx = 0;
  let loopTimer = null;
  let activeVoices = [];

  // Convert note name (e.g. "A4", "F#5") to frequency
  function noteToFreq(n) {
    if (!n || n === '-') return 0;
    const m = n.match(/^([A-G])(#|b)?(-?\d)$/);
    if (!m) return 0;
    const steps = { C:0, D:2, E:4, F:5, G:7, A:9, B:11 }[m[1]];
    const acc = m[2] === '#' ? 1 : m[2] === 'b' ? -1 : 0;
    const oct = parseInt(m[3]);
    const midi = (oct + 1) * 12 + steps + acc;
    return 440 * Math.pow(2, (midi - 69) / 12);
  }

  function ensureCtx() {
    if (ctx) return;
    try {
      const AC = window.AudioContext || window.webkitAudioContext;
      ctx = new AC();
      masterGain = ctx.createGain();
      masterGain.gain.value = volume;
      masterGain.connect(ctx.destination);
      musicGain = ctx.createGain();
      musicGain.gain.value = 0.35;
      musicGain.connect(masterGain);
      sfxGain = ctx.createGain();
      sfxGain.gain.value = 0.7;
      sfxGain.connect(masterGain);
    } catch (e) { console.warn('Audio unavailable', e); }
  }

  // Synthesize a piano-like note
  function playNote(freq, duration, dest, velocity = 1, type = 'piano') {
    if (!freq || !ctx) return;
    const t0 = ctx.currentTime;
    const osc1 = ctx.createOscillator();
    const osc2 = ctx.createOscillator();
    const gain = ctx.createGain();
    const filter = ctx.createBiquadFilter();

    if (type === 'piano') {
      osc1.type = 'triangle';
      osc2.type = 'sine';
      osc2.frequency.value = freq * 2; // octave up harmonic
      filter.type = 'lowpass';
      filter.frequency.value = 2800;
      filter.Q.value = 0.6;
    } else if (type === 'bell') {
      osc1.type = 'sine';
      osc2.type = 'sine';
      osc2.frequency.value = freq * 3.01;
      filter.type = 'lowpass';
      filter.frequency.value = 5000;
    } else {
      osc1.type = 'triangle';
      osc2.type = 'sine';
      osc2.frequency.value = freq * 2;
      filter.type = 'lowpass';
      filter.frequency.value = 3000;
    }
    osc1.frequency.value = freq;

    // ADSR
    const attack = 0.008;
    const decay = 0.15;
    const sustain = 0.3 * velocity;
    const release = Math.min(0.3, duration * 0.5);
    gain.gain.setValueAtTime(0, t0);
    gain.gain.linearRampToValueAtTime(velocity, t0 + attack);
    gain.gain.exponentialRampToValueAtTime(Math.max(0.001, sustain), t0 + attack + decay);
    gain.gain.setValueAtTime(Math.max(0.001, sustain), t0 + duration - release);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + duration);

    const mix = ctx.createGain();
    mix.gain.value = 0.6;
    osc1.connect(mix);
    const harmGain = ctx.createGain();
    harmGain.gain.value = 0.25;
    osc2.connect(harmGain);
    harmGain.connect(mix);
    mix.connect(filter);
    filter.connect(gain);
    gain.connect(dest || masterGain);

    osc1.start(t0);
    osc2.start(t0);
    osc1.stop(t0 + duration + 0.05);
    osc2.stop(t0 + duration + 0.05);

    const voice = { osc1, osc2, gain, stop: (when) => {
      const t = when || ctx.currentTime;
      try {
        gain.gain.cancelScheduledValues(t);
        gain.gain.setValueAtTime(gain.gain.value, t);
        gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.1);
        osc1.stop(t + 0.12);
        osc2.stop(t + 0.12);
      } catch(e){}
    }};
    activeVoices.push(voice);
    setTimeout(() => { activeVoices = activeVoices.filter(v => v !== voice); }, (duration + 0.2) * 1000);
    return voice;
  }

  // ============ TRACKS ============
  // Note arrays: [note, duration in beats, velocity]. Use '-' for rest.
  const TRACKS = [
    {
      id: 'minuet',
      name: 'Minuet in G',
      composer: 'J.S. Bach',
      bpm: 120,
      beat: 0.5, // seconds per beat
      notes: [
        // Phrase 1
        ['D5',1],['G4',.5],['A4',.5],['B4',.5],['C5',.5],
        ['D5',1],['G4',1],
        ['E5',1],['C5',.5],['D5',.5],['E5',.5],['F#5',.5],
        ['G5',1],['G4',1],
        ['C5',1],['D5',.5],['C5',.5],['B4',.5],['A4',.5],
        ['B4',1],['C5',.5],['B4',.5],['A4',.5],['G4',.5],
        ['F#4',1],['G4',.5],['A4',.5],['B4',.5],['G4',.5],
        ['A4',2],
        // Phrase 2 (repeat with ending variation)
        ['D5',1],['G4',.5],['A4',.5],['B4',.5],['C5',.5],
        ['D5',1],['G4',1],
        ['E5',1],['C5',.5],['D5',.5],['E5',.5],['F#5',.5],
        ['G5',1],['G4',1],
        ['C5',1],['D5',.5],['C5',.5],['B4',.5],['A4',.5],
        ['B4',1],['C5',.5],['B4',.5],['A4',.5],['G4',.5],
        ['F#4',.5],['G4',.5],['A4',.5],['F#4',.5],['G4',.5],['A4',.5],
        ['G4',2],
      ],
    },
    {
      id: 'canon',
      name: 'Canon in D',
      composer: 'Pachelbel',
      bpm: 60,
      beat: 1.0,
      notes: [
        // Bassline pattern (D-A-Bm-F#m-G-D-G-A) with melody on top
        ['F#5',1],['E5',1],['D5',1],['C#5',1],
        ['B4',1],['A4',1],['B4',1],['C#5',1],
        ['D5',1],['C#5',1],['B4',1],['A4',1],
        ['G4',1],['F#4',1],['G4',1],['E4',1],
        ['F#4',.5],['E4',.5],['F#4',.5],['F#5',.5],['E5',.5],['D5',.5],['E5',.5],['F#5',.5],
        ['D5',1],['F#5',1],['E5',1],['D5',1],
        ['C#5',.5],['B4',.5],['A4',.5],['B4',.5],['C#5',.5],['D5',.5],['E5',.5],['F#5',.5],
        ['A5',1],['G5',1],['F#5',1],['E5',1],
      ],
    },
    {
      id: 'gymnopedie',
      name: 'Gymnopédie No. 1',
      composer: 'Erik Satie',
      bpm: 66,
      beat: 0.9,
      notes: [
        // Just the main melodic motif, simplified
        ['D5',1.5],['A4',1.5],['F#5',3],
        ['E5',1.5],['A4',1.5],['C#5',3],
        ['D5',1.5],['A4',1.5],['G5',3],
        ['F#5',1.5],['E5',1.5],['D5',3],
        ['-',1.5],
        ['F#5',1.5],['A4',1.5],['D5',3],
        ['E5',1.5],['A4',1.5],['C#5',3],
        ['D5',1.5],['F#5',1.5],['E5',3],
        ['D5',6],
      ],
    },
    {
      id: 'eine',
      name: 'Eine kleine Nachtmusik',
      composer: 'Mozart',
      bpm: 140,
      beat: 0.43,
      notes: [
        ['G4',.5],['D5',.5],['G4',.5],['D5',.5],
        ['G4',.25],['D5',.25],['G4',.25],['B4',.25],['G5',1],
        ['F5',.5],['D5',.5],['F5',.5],['D5',.5],
        ['F5',.25],['D5',.25],['F5',.25],['A4',.25],['F5',1],
        ['E5',.5],['C5',.5],['E5',.5],['C5',.5],
        ['E5',.25],['C5',.25],['E5',.25],['G4',.25],['E5',1],
        ['D5',.5],['C5',.5],['B4',.5],['A4',.5],
        ['G4',.5],['B4',.5],['D5',1],
        ['G4',.5],['D5',.5],['G4',.5],['D5',.5],
        ['G4',.25],['D5',.25],['G4',.25],['B4',.25],['G5',1],
      ],
    },
    {
      id: 'claire',
      name: 'Clair de Lune',
      composer: 'Debussy',
      bpm: 72,
      beat: 0.83,
      notes: [
        ['D#5',1.5],['F5',.5],['A#5',1],['D#6',1],['C6',1.5],
        ['A#5',.5],['G#5',1],['F5',1],['D#5',2],
        ['D#5',1.5],['F5',.5],['A#5',1],['D#6',1],['F6',1.5],
        ['D#6',.5],['C6',1],['A#5',1],['G#5',2],
        ['F5',1],['G#5',1],['A#5',1],['C6',1],
        ['D#6',1.5],['C6',.5],['A#5',1],['G#5',1],
        ['F5',2],['D#5',2],
      ],
    },
  ];

  let currentStep = 0;
  function playNextStep() {
    if (!musicEnabled || !ctx) return;
    const track = TRACKS[currentTrackIdx];
    const ev = track.notes[currentStep % track.notes.length];
    currentStep++;
    const [note, beats, vel=0.6] = ev;
    const dur = beats * track.beat;
    if (note !== '-') {
      const f = noteToFreq(note);
      playNote(f, dur * 0.95, musicGain, vel, 'piano');
      // Add subtle lower harmonic for richness (fifth below)
      if (beats >= 1) playNote(f * 0.5, dur * 0.95, musicGain, vel * 0.35, 'piano');
    }
    // Gap between loops
    let nextMs = dur * 1000;
    if (currentStep % track.notes.length === 0) nextMs += 1400;
    loopTimer = setTimeout(playNextStep, nextMs);
  }

  function startMusic() {
    ensureCtx();
    if (!ctx) return;
    if (ctx.state === 'suspended') ctx.resume();
    musicEnabled = true;
    currentStep = 0;
    stopLoop();
    playNextStep();
    document.getElementById('am-music-switch').classList.add('on');
    document.getElementById('audio-btn').classList.add('on');
  }
  function stopMusic() {
    musicEnabled = false;
    stopLoop();
    // Fade out existing notes
    if (ctx && musicGain) {
      const t = ctx.currentTime;
      musicGain.gain.cancelScheduledValues(t);
      musicGain.gain.setValueAtTime(musicGain.gain.value, t);
      musicGain.gain.linearRampToValueAtTime(0, t + 0.3);
      setTimeout(() => { if (ctx && musicGain) musicGain.gain.value = 0.35; }, 350);
    }
    document.getElementById('am-music-switch').classList.remove('on');
    if (!sfxEnabled) document.getElementById('audio-btn').classList.remove('on');
  }
  function stopLoop() { if (loopTimer) { clearTimeout(loopTimer); loopTimer = null; } }

  function selectTrack(idx) {
    currentTrackIdx = idx;
    document.querySelectorAll('#am-tracks .am-track').forEach((el, i) => el.classList.toggle('active', i === idx));
    if (musicEnabled) {
      stopLoop();
      currentStep = 0;
      playNextStep();
    }
  }

  // ============ SOUND EFFECTS ============
  function sfx(notes, type = 'bell', gapBeat = 0.06) {
    if (!sfxEnabled) return;
    ensureCtx();
    if (!ctx) return;
    if (ctx.state === 'suspended') ctx.resume();
    let delay = 0;
    for (const [n, d, v=1] of notes) {
      const f = noteToFreq(n);
      setTimeout(() => playNote(f, d, sfxGain, v, type), delay * 1000);
      delay += gapBeat;
    }
  }

  const SFX = {
    pickTile:    () => sfx([['E6', 0.08, 0.7]], 'bell'),
    placeTile:   () => sfx([['C5', 0.12, 0.6]], 'piano'),
    placeFloor:  () => sfx([['A3', 0.25, 0.55]], 'piano'),
    scorePoint:  () => sfx([['G5', 0.08, 0.7], ['C6', 0.12, 0.7]], 'bell', 0.05),
    scoreBig:    () => sfx([['C5', 0.08, 0.7], ['E5', 0.08, 0.7], ['G5', 0.08, 0.7], ['C6', 0.2, 0.8]], 'bell', 0.07),
    penalty:     () => sfx([['E4', 0.1, 0.6], ['C4', 0.2, 0.5]], 'piano', 0.06),
    rowComplete: () => sfx([['C5', 0.1, 0.7], ['E5', 0.1, 0.7], ['G5', 0.1, 0.7], ['C6', 0.15, 0.8], ['E6', 0.3, 0.8]], 'bell', 0.08),
    roundEnd:    () => sfx([['G4', 0.15, 0.7], ['B4', 0.15, 0.7], ['D5', 0.15, 0.7], ['G5', 0.35, 0.8]], 'piano', 0.12),
    victory:     () => sfx([
      ['C5', 0.2, 0.7], ['E5', 0.2, 0.7], ['G5', 0.2, 0.7], ['C6', 0.2, 0.8],
      ['E6', 0.15, 0.8], ['G6', 0.15, 0.8], ['C7', 0.5, 0.9]
    ], 'bell', 0.15),
    undo:        () => sfx([['A5', 0.08, 0.5], ['E5', 0.1, 0.45]], 'piano', 0.05),
  };

  function toggleMusic() {
    if (musicEnabled) stopMusic(); else startMusic();
  }
  function toggleSfx() {
    sfxEnabled = !sfxEnabled;
    document.getElementById('am-sfx-switch').classList.toggle('on', sfxEnabled);
    if (sfxEnabled || musicEnabled) document.getElementById('audio-btn').classList.add('on');
    else document.getElementById('audio-btn').classList.remove('on');
  }
  function setVolume(v) {
    volume = v / 100;
    if (masterGain) masterGain.gain.value = volume;
  }
  function init() {
    // Render tracks
    const cont = document.getElementById('am-tracks');
    cont.innerHTML = TRACKS.map((t, i) => `
      <div class="am-track ${i===currentTrackIdx?'active':''}" onclick="Snd.selectTrack(${i})">
        <span>${t.name}</span>
        <span class="am-composer">${t.composer}</span>
      </div>`).join('');
    document.getElementById('am-sfx-switch').classList.toggle('on', sfxEnabled);
  }

  return { init, toggleMusic, toggleSfx, setVolume, selectTrack, SFX, isMusicOn: () => musicEnabled };
})();

function toggleMusic() { Snd.toggleMusic(); }
function toggleSfx() { Snd.toggleSfx(); }
function setVolume(v) { Snd.setVolume(v); }
function toggleAudioMenu(e) {
  if (e) e.stopPropagation();
  const m = document.getElementById('audio-menu');
  m.classList.toggle('show');
}
document.addEventListener('click', e => {
  const m = document.getElementById('audio-menu');
  if (!m.classList.contains('show')) return;
  if (m.contains(e.target) || e.target.id === 'audio-btn' || e.target.closest('#audio-btn')) return;
  m.classList.remove('show');
});
window.Snd = Snd; // expose for inline onclick handlers

// ============ CONSTANTS ============
const COLORS = ['blue','yellow','red','black','cyan'];
const COLOR_ICONS = { blue:'\u25C6', yellow:'\u2605', red:'\u2764', black:'\u2736', cyan:'\u2022' };
const FLOOR_PEN = [-1,-1,-2,-2,-2,-3,-3];
const WALL = [
  ['blue','yellow','red','black','cyan'],
  ['cyan','blue','yellow','red','black'],
  ['black','cyan','blue','yellow','red'],
  ['red','black','cyan','blue','yellow'],
  ['yellow','red','black','cyan','blue'],
];

// ============ STATE ============
let S = {}, CFG = {}, sel = null, undoState = null;
let gameGen = 0; // increments on each new game; in-flight async ops abort if mismatched

function initState(np, ai, difficulty = 'medium') {
  const nf = np * 2 + 1;
  CFG = { np, ai, nf, difficulty };
  S = { fac:[], ctr:[], ctrFirst:true, players:[], cur:0, round:1, phase:'pick', over:false };
  for (let i = 0; i < np; i++) {
    S.players.push({
      name: (ai && i > 0) ? 'AI' : `Player ${i+1}`,
      isAI: ai && i > 0,
      score: 0,
      pat: [[],[],[],[],[]], // pattern lines
      wall: Array.from({length:5}, ()=>Array(5).fill(false)),
      floor: [],
      first: false,
    });
  }
  fillFactories();
  sel = null; undoState = null;
}

function fillFactories() {
  S.fac = [];
  const bag = makeBag();
  for (let i = 0; i < CFG.nf; i++) {
    const f = [];
    for (let j = 0; j < 4 && bag.length; j++) {
      f.push(bag.splice(Math.floor(Math.random()*bag.length),1)[0]);
    }
    S.fac.push(f);
  }
  S.ctr = [];
  S.ctrFirst = true;
}

function makeBag() {
  const b = [];
  for (const c of COLORS) for (let i = 0; i < 20; i++) b.push(c);
  for (let i = b.length-1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [b[i],b[j]]=[b[j],b[i]]; }
  return b;
}

function deepClone(o) { return JSON.parse(JSON.stringify(o)); }

// ============ GAME LOGIC ============
function pickTiles(src, fi, color) {
  const p = S.players[S.cur];
  if (p.isAI || S.phase !== 'pick' || S.over) return;

  // Save undo state
  undoState = deepClone(S);

  let count = 0;
  if (src === 'factory') {
    const fac = S.fac[fi];
    const rest = [];
    for (const t of fac) { if (t === color) count++; else rest.push(t); }
    S.fac[fi] = [];
    S.ctr.push(...rest);
  } else {
    count = S.ctr.filter(t => t === color).length;
    S.ctr = S.ctr.filter(t => t !== color);
    var tookFirst = false;
    if (S.ctrFirst) { p.first = true; p.floor.push('first'); S.ctrFirst = false; tookFirst = true; }
  }

  Snd.SFX.pickTile();
  sel = { color, count };
  S.phase = 'place';
  const firstMsg = (typeof tookFirst !== 'undefined' && tookFirst) ? ' <span style="color:var(--accent);font-style:italic;">(you took the 1st-player token: \u2212 1 pt next scoring)</span>' : '';
  setStatus(`<span class="step-num">2</span> Place ${count} <b style="color:var(--${color})">${color}</b> tile${count>1?'s':''} on a pattern row${firstMsg}`);
  document.getElementById('undo-btn').style.display = 'inline-block';
  render();
}

function undoPick() {
  if (!undoState || S.phase !== 'place') return;
  Snd.SFX.undo();
  S = undoState;
  sel = null; undoState = null;
  S.phase = 'pick';
  document.getElementById('undo-btn').style.display = 'none';
  setStatus(`<span class="step-num">1</span> ${S.players[S.cur].name}, pick tiles from a factory or center`);
  render();
}

function placeTiles(row) {
  if (!sel || S.phase !== 'place' || S.over) return;
  const p = S.players[S.cur];
  if (p.isAI) return;
  const { color, count } = sel;

  if (row === -1) {
    for (let i = 0; i < count; i++) if (p.floor.length < 7) p.floor.push(color);
    Snd.SFX.placeFloor();
  } else {
    const line = p.pat[row], max = row + 1;
    const wc = WALL[row].indexOf(color);
    if (p.wall[row][wc]) return;
    if (line.length > 0 && line[0] !== color) return;
    const space = max - line.length;
    const toPlace = Math.min(count, space);
    for (let i = 0; i < toPlace; i++) line.push(color);
    for (let i = 0; i < count - toPlace; i++) if (p.floor.length < 7) p.floor.push(color);
    Snd.SFX.placeTile();
  }

  sel = null; undoState = null;
  S.phase = 'pick';
  document.getElementById('undo-btn').style.display = 'none';
  endTurn();
}

function endTurn() {
  const allEmpty = S.fac.every(f => !f.length) && !S.ctr.length;
  if (allEmpty) { endRound(); return; }
  S.cur = (S.cur + 1) % CFG.np;
  setStatus(`<span class="step-num">1</span> ${S.players[S.cur].name}, pick tiles from a factory or center`);
  render();
  if (S.players[S.cur].isAI && !S.over) scheduleAI(500);
}

// Scoring animation speed: 'normal' | 'fast' | 'instant'
let scoringSpeed = 'fast';
const SPEED_MULT = { normal: 1, fast: 0.35, instant: 0 };
const wait = ms => {
  const mult = SPEED_MULT[scoringSpeed] ?? 1;
  if (mult === 0) return Promise.resolve();
  return new Promise(r => setTimeout(r, ms * mult));
};
function setScoringSpeed(s) {
  scoringSpeed = s;
  document.querySelectorAll('#am-speed .am-speed-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.speed === s);
  });
}

async function showBanner(text, sub, duration = 1400) {
  if (scoringSpeed === 'instant') return;
  const banner = document.getElementById('scoring-banner');
  banner.innerHTML = text + (sub ? `<span class="banner-sub">${sub}</span>` : '');
  banner.className = '';
  void banner.offsetWidth;
  banner.classList.add('show');
  await wait(duration);
  banner.classList.remove('show');
}

function getBoard(pi) { return document.querySelectorAll('.player-board')[pi]; }
function getPatternSlot(pi, row, idx) {
  const rowEl = getBoard(pi).querySelectorAll('.p-row')[row];
  // pattern slots are rendered right-to-left, so idx 0 = rightmost
  return rowEl.children[idx];
}
function getWallSlot(pi, row, col) {
  return getBoard(pi).querySelectorAll('.wall-row')[row].children[col];
}

function focusPlayer(pi) {
  if (scoringSpeed === 'instant') return;
  document.querySelectorAll('.player-board').forEach((b, i) => {
    b.classList.remove('scoring-focus', 'scoring-dim');
    b.classList.add(i === pi ? 'scoring-focus' : 'scoring-dim');
  });
}
function clearFocus() {
  document.querySelectorAll('.player-board').forEach(b => b.classList.remove('scoring-focus', 'scoring-dim'));
}

// Clear scoring-highlight classes from all wall slots of a player so animations can retrigger
function clearWallHighlights(pi) {
  const board = getBoard(pi);
  if (!board) return;
  board.querySelectorAll('.w-slot').forEach(s => {
    s.classList.remove('adj-chain', 'scoring');
  });
  // Force reflow so re-adding the class restarts the CSS animation
  void board.offsetWidth;
}

async function flyTile(fromEl, toEl, color) {
  const fr = fromEl.getBoundingClientRect();
  const tr = toEl.getBoundingClientRect();
  const fly = document.createElement('div');
  fly.className = `t t-${color} fly-tile`;
  fly.style.left = fr.left + 'px';
  fly.style.top = fr.top + 'px';
  fly.style.width = fr.width + 'px';
  fly.style.height = fr.height + 'px';
  document.body.appendChild(fly);
  void fly.offsetWidth;
  const dx = tr.left - fr.left;
  const dy = tr.top - fr.top;
  fly.style.transform = `translate(${dx}px, ${dy}px) scale(1.15) rotate(8deg)`;
  fly.style.filter = 'brightness(1.2) drop-shadow(0 6px 12px rgba(0,0,0,.5))';
  await wait(500);
  fly.style.transform = `translate(${dx}px, ${dy}px) scale(1) rotate(0deg)`;
  fly.style.filter = 'none';
  await wait(100);
  fly.remove();
}

function drawChainLines(pi, row, col, adj) {
  if (scoringSpeed === 'instant') return;
  const svgNs = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(svgNs, 'svg');
  svg.setAttribute('class', 'chain-overlay');
  svg.style.left = '0';
  svg.style.top = '0';
  svg.style.width = '100vw';
  svg.style.height = '100vh';
  document.body.appendChild(svg);
  const centerOf = el => {
    const r = el.getBoundingClientRect();
    return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
  };
  const center = centerOf(getWallSlot(pi, row, col));
  for (const [ar, ac] of adj) {
    const p = centerOf(getWallSlot(pi, ar, ac));
    const line = document.createElementNS(svgNs, 'line');
    line.setAttribute('x1', center.x);
    line.setAttribute('y1', center.y);
    line.setAttribute('x2', p.x);
    line.setAttribute('y2', p.y);
    svg.appendChild(line);
  }
  setTimeout(() => svg.remove(), 1100);
}

function showTally(anchor, text) {
  if (scoringSpeed === 'instant') return;
  const r = anchor.getBoundingClientRect();
  const el = document.createElement('div');
  el.className = 'tally-ticker';
  el.textContent = text;
  el.style.left = (r.left + r.width / 2) + 'px';
  el.style.top = r.top + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1700);
}

function floatPoints(anchorEl, text, cls = 'pos') {
  if (scoringSpeed === 'instant') return;
  const rect = anchorEl.getBoundingClientRect();
  const el = document.createElement('div');
  el.className = `points-pop ${cls}`;
  el.textContent = text;
  el.style.left = (rect.left + rect.width / 2) + 'px';
  el.style.top = (rect.top + rect.height / 2) + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1500);
}

function popScore(pi) {
  const board = getBoard(pi);
  if (!board) return;
  const scoreEl = board.querySelector('.player-score');
  if (!scoreEl) return;
  scoreEl.textContent = S.players[pi].score;
  scoreEl.classList.remove('pop');
  void scoreEl.offsetWidth;
  scoreEl.classList.add('pop');
}

function showCompleteBadge(anchor, text) {
  if (scoringSpeed === 'instant') return;
  const r = anchor.getBoundingClientRect();
  const el = document.createElement('div');
  el.className = 'line-complete';
  el.textContent = text;
  el.style.left = (r.left + r.width / 2) + 'px';
  el.style.top = (r.top + r.height / 2) + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2000);
}

async function endRound() {
  const myGen = gameGen;
  const stale = () => gameGen !== myGen;
  S.phase = 'scoring';
  const pre = S.players.map(p => p.score);
  const details = S.players.map(p => ({
    wallPts: 0,
    floorPts: 0,
    floorCount: p.floor.length,
    hadFirst: p.floor.includes('first'),
  }));

  if (scoringSpeed !== 'instant') Snd.SFX.roundEnd();
  await showBanner(`Round ${S.round}`, 'Scoring begins', 1300);
  if (stale()) return;

  // Per-player scoring
  for (let pi = 0; pi < S.players.length; pi++) {
    if (stale()) return;
    const p = S.players[pi];
    const hasWallScoring = p.pat.some((line, r) => line.length === r + 1);
    const hasFloor = p.floor.length > 0;
    if (!hasWallScoring && !hasFloor) continue;

    focusPlayer(pi);
    await showBanner(p.name, 'Tallying tiles', 900);

    // Wall scoring — one row at a time
    for (let r = 0; r < 5; r++) {
      if (p.pat[r].length !== r + 1) continue;
      const color = p.pat[r][0];
      const col = WALL[r].indexOf(color);

      if (scoringSpeed === 'instant') {
        // Fast path: no flight animation, just commit
        p.pat[r] = [];
        p.wall[r][col] = true;
      } else {
        // Capture pattern slot BEFORE we mutate
        const fromSlot = getPatternSlot(pi, r, 0);
        const toSlot = getWallSlot(pi, r, col);
        const fromRect = fromSlot.getBoundingClientRect();
        const toRect = toSlot.getBoundingClientRect();

        p.pat[r] = [];
        render();

        const fly = document.createElement('div');
        fly.className = `t t-${color} fly-tile`;
        fly.style.left = fromRect.left + 'px';
        fly.style.top = fromRect.top + 'px';
        fly.style.width = fromRect.width + 'px';
        fly.style.height = fromRect.height + 'px';
        document.body.appendChild(fly);
        void fly.offsetWidth;
        const dx = toRect.left - fromRect.left;
        const dy = toRect.top - fromRect.top;
        fly.style.transform = `translate(${dx}px, ${dy}px) scale(1.2) rotate(8deg)`;
        fly.style.filter = 'brightness(1.25) drop-shadow(0 8px 14px rgba(0,0,0,.6))';
        await wait(500);
        fly.style.transform = `translate(${dx}px, ${dy}px) scale(1) rotate(0)`;
        fly.style.filter = 'none';
        await wait(80);

        p.wall[r][col] = true;
        fly.remove();
      }
      render();

      // Pulse the landed tile
      const landed = getWallSlot(pi, r, col);
      landed.classList.add('scoring');

      // Collect adjacency
      const adj = [];
      let h = 0, v = 0;
      for (let x = col-1; x >= 0 && p.wall[r][x]; x--) { h++; adj.push([r,x]); }
      for (let x = col+1; x < 5 && p.wall[r][x]; x++) { h++; adj.push([r,x]); }
      for (let x = r-1; x >= 0 && p.wall[x][col]; x--) { v++; adj.push([x,col]); }
      for (let x = r+1; x < 5 && p.wall[x][col]; x++) { v++; adj.push([x,col]); }
      const pts = (h>0&&v>0) ? h+v+2-1 : (h>0) ? h+1 : (v>0) ? v+1 : 1;

      if (scoringSpeed !== 'instant' && adj.length > 0) {
        drawChainLines(pi, r, col, adj);
        for (const [ar, ac] of adj) getWallSlot(pi, ar, ac).classList.add('adj-chain');
        const breakdown = (h>0&&v>0) ? `${h+1} \u2194  \u00D7  ${v+1} \u2195` : (h>0) ? `${h+1} in a row` : `${v+1} in a column`;
        showTally(landed, breakdown);
        await wait(700);
      } else if (scoringSpeed !== 'instant') {
        await wait(300);
      }

      // Points float + score pop
      floatPoints(landed, `+${pts}`, 'pos');
      if (scoringSpeed !== 'instant') {
        if (pts >= 4) Snd.SFX.scoreBig(); else Snd.SFX.scorePoint();
      }
      p.score += pts;
      details[pi].wallPts += pts;
      popScore(pi);

      // Check for row/column completion mid-round (visual celebration only)
      const rowDone = p.wall[r].every(c => c);
      let colFull = true;
      for (let rr = 0; rr < 5; rr++) if (!p.wall[rr][col]) { colFull = false; break; }
      if ((rowDone || colFull) && scoringSpeed !== 'instant') Snd.SFX.rowComplete();
      if (rowDone && colFull) {
        showCompleteBadge(landed, 'Row + Column!');
      } else if (rowDone) {
        showCompleteBadge(landed, 'Row Complete!');
      } else if (colFull) {
        showCompleteBadge(landed, 'Column!');
      }

      await wait(800);
    }

    // Floor penalties — flick tiles off one at a time
    if (hasFloor) {
      const board = getBoard(pi);
      const floorEl = board.querySelector('.floor-line');
      const floorLen = Math.min(p.floor.length, FLOOR_PEN.length);
      let totalPen = 0;
      for (let i = 0; i < floorLen; i++) {
        const pen = FLOOR_PEN[i];
        totalPen += pen;
        const slot = floorEl.children[i];
        if (slot && scoringSpeed !== 'instant') {
          slot.classList.add('flicking');
          const tileEl = slot.querySelector('.t');
          if (tileEl) floatPoints(tileEl, `${pen}`, 'neg small');
        }
        if (scoringSpeed !== 'instant') Snd.SFX.penalty();
        await wait(260);
      }

      details[pi].floorPts = totalPen;
      p.score = Math.max(0, p.score + totalPen);
      // Show cumulative penalty
      floatPoints(floorEl, `${totalPen}`, 'neg');
      popScore(pi);
      await wait(700);

      // Actually clear floor
      p.floor = [];
      render();
      await wait(250);
    }

    await wait(300);
  }
  if (stale()) return;
  clearFocus();

  const isEnd = S.players.some(p => p.wall.some(r => r.every(c => c)));
  if (isEnd) {
    await showBanner('Final Scoring', 'Awarding bonuses', 1200);
    if (stale()) return;
    await animateFinalBonuses(details);
    if (stale()) return;
    S.over = true;
    render();
    showGameOver();
    return;
  }

  showRoundSummary(pre, details);
}

async function animateFinalBonuses(details) {
  for (let pi = 0; pi < S.players.length; pi++) {
    const p = S.players[pi];
    focusPlayer(pi);
    await wait(250);

    // Rows: +2 each
    for (let r = 0; r < 5; r++) {
      if (p.wall[r].every(c => c)) {
        clearWallHighlights(pi);
        p.score += 2;
        const anchor = getWallSlot(pi, r, 2);
        for (let c = 0; c < 5; c++) getWallSlot(pi, r, c).classList.add('adj-chain');
        floatPoints(anchor, '+2', 'pos');
        showCompleteBadge(anchor, 'Row +2');
        if (scoringSpeed !== 'instant') Snd.SFX.scoreBig();
        popScore(pi);
        await wait(750);
      }
    }
    // Columns: +7 each
    for (let c = 0; c < 5; c++) {
      if (p.wall.every(r => r[c])) {
        clearWallHighlights(pi);
        p.score += 7;
        const anchor = getWallSlot(pi, 2, c);
        for (let r = 0; r < 5; r++) getWallSlot(pi, r, c).classList.add('adj-chain');
        floatPoints(anchor, '+7', 'pos');
        showCompleteBadge(anchor, 'Column +7');
        if (scoringSpeed !== 'instant') Snd.SFX.rowComplete();
        popScore(pi);
        await wait(850);
      }
    }
    // Colors: +10 each
    for (const col of COLORS) {
      let n = 0, lastR = 0, lastC = 0;
      for (let r = 0; r < 5; r++) {
        const c = WALL[r].indexOf(col);
        if (p.wall[r][c]) { n++; lastR = r; lastC = c; }
      }
      if (n === 5) {
        clearWallHighlights(pi);
        p.score += 10;
        for (let r = 0; r < 5; r++) {
          const c = WALL[r].indexOf(col);
          getWallSlot(pi, r, c).classList.add('adj-chain');
        }
        const anchor = getWallSlot(pi, lastR, lastC);
        floatPoints(anchor, '+10', 'pos');
        showCompleteBadge(anchor, `All ${col}! +10`);
        if (scoringSpeed !== 'instant') Snd.SFX.victory();
        popScore(pi);
        await wait(950);
      }
    }
    await wait(400);
  }
  clearFocus();
}

function showRoundSummary(pre, details) {
  const el = document.getElementById('round-summary');
  document.getElementById('summary-title').textContent = `Round ${S.round} Complete`;
  const cont = document.getElementById('summary-players');
  cont.innerHTML = '';
  for (let i = 0; i < S.players.length; i++) {
    const p = S.players[i];
    const change = p.score - pre[i];
    const d = document.createElement('div');
    d.className = 'summary-p';
    const dt = details[i];
    const floorNote = dt.floorPts < 0
      ? ` <span style="opacity:.8">(floor ${dt.floorPts}${dt.hadFirst ? ', includes 1st token \u22121' : ''})</span>`
      : '';
    d.innerHTML = `
      <span class="sp-name">${p.name}</span>
      <span class="sp-change ${change>=0?'pos':'neg'}">${change>=0?'+':''}${change} <span style="opacity:.7;font-size:12px;">wall +${dt.wallPts}${floorNote}</span></span>
      <span class="sp-score">${p.score}</span>
    `;
    cont.appendChild(d);
  }
  el.classList.add('show');
  render();
}

function closeSummaryAndContinue() {
  // Guard: if user started a new game, do nothing
  if (!S.players || !S.players.length) return;
  document.getElementById('round-summary').classList.remove('show');
  S.round++;
  const fi = S.players.findIndex(p => p.first);
  if (fi >= 0) { S.cur = fi; S.players[fi].first = false; }
  fillFactories();
  S.phase = 'pick';
  setStatus(`<span class="step-num">1</span> Round ${S.round} &mdash; ${S.players[S.cur].name}, pick tiles`);
  render();
  if (S.players[S.cur].isAI) scheduleAI(500);
}

function finalScore() {
  for (const p of S.players) {
    for (let r=0;r<5;r++) if(p.wall[r].every(c=>c)) p.score+=2;
    for (let c=0;c<5;c++) if(p.wall.every(r=>r[c])) p.score+=7;
    for (const col of COLORS) {
      let n=0;
      for (let r=0;r<5;r++) { const c=WALL[r].indexOf(col); if(p.wall[r][c]) n++; }
      if (n===5) p.score+=10;
    }
  }
}

// ============ AI ENGINE ============
function scheduleAI(ms) {
  const myGen = gameGen;
  setTimeout(() => { if (gameGen === myGen) doAI(); }, ms);
}

function doAI() {
  if (S.over || S.phase !== 'pick') return;
  const p = S.players[S.cur];
  if (!p || !p.isAI) return;
  const moves = enumerateMoves(S, S.cur);
  if (!moves.length) { endTurn(); return; }
  const diff = CFG.difficulty || 'medium';
  const best = diff === 'hard' ? pickHard(moves) : diff === 'medium' ? pickMedium(moves) : pickEasy(moves);
  execMove(S, S.cur, best);
  S.phase = 'pick';
  endTurn();
}

// ---------- Move enumeration (shared by all levels) ----------
function enumerateMoves(state, pi) {
  const p = state.players[pi], srcs = [], moves = [];
  state.fac.forEach((f,fi) => {
    if(!f.length) return;
    for (const c of [...new Set(f)]) srcs.push({src:'f',fi,color:c,count:f.filter(t=>t===c).length});
  });
  if (state.ctr.length) {
    for (const c of [...new Set(state.ctr)]) srcs.push({src:'c',fi:-1,color:c,count:state.ctr.filter(t=>t===c).length});
  }
  for (const s of srcs) {
    for (let r=0;r<5;r++) {
      const line=p.pat[r], max=r+1, wc=WALL[r].indexOf(s.color);
      if(p.wall[r][wc]||line.length>=max||(line.length&&line[0]!==s.color)) continue;
      moves.push({...s,row:r});
    }
    moves.push({...s,row:-1}); // floor
  }
  return moves;
}

// ---------- Move execution (mutates state) ----------
function execMove(state, pi, m) {
  const p = state.players[pi];
  if(m.src==='f') {
    const rest=state.fac[m.fi].filter(t=>t!==m.color);
    state.fac[m.fi]=[];
    state.ctr.push(...rest);
  } else {
    state.ctr=state.ctr.filter(t=>t!==m.color);
    if(state.ctrFirst){p.first=true;p.floor.push('first');state.ctrFirst=false;}
  }
  if(m.row===-1) { for(let i=0;i<m.count;i++) if(p.floor.length<7) p.floor.push(m.color); }
  else {
    const line=p.pat[m.row], space=m.row+1-line.length, tp=Math.min(m.count,space);
    for(let i=0;i<tp;i++) line.push(m.color);
    for(let i=0;i<m.count-tp;i++) if(p.floor.length<7) p.floor.push(m.color);
  }
}

// ---------- State cloning for simulation ----------
function cloneState(state) {
  return {
    fac: state.fac.map(f=>[...f]),
    ctr: [...state.ctr],
    ctrFirst: state.ctrFirst,
    players: state.players.map(p=>({
      name: p.name, isAI: p.isAI, first: p.first,
      score: p.score,
      pat: p.pat.map(r=>[...r]),
      wall: p.wall.map(r=>[...r]),
      floor: [...p.floor],
    })),
    cur: state.cur, round: state.round, phase: state.phase, over: state.over,
  };
}

// ---------- Adjacency scorer (used by all levels) ----------
function wallPtsFor(wall, r, col) {
  let h=0,v=0;
  for(let x=col-1;x>=0&&wall[r][x];x--)h++;
  for(let x=col+1;x<5&&wall[r][x];x++)h++;
  for(let x=r-1;x>=0&&wall[x][col];x--)v++;
  for(let x=r+1;x<5&&wall[x][col];x++)v++;
  return (h>0&&v>0)?h+v+1:(h>0)?h+1:(v>0)?v+1:1;
}

// ---------- Full position evaluator (medium + hard) ----------
function evalPosition(state, pi) {
  const p = state.players[pi];
  let sc = p.score;

  // 1. Immediate end-of-round wall scoring (simulate completing pattern lines)
  const simWall = p.wall.map(r=>[...r]);
  for (let r=0;r<5;r++) {
    if (p.pat[r].length === r+1) {
      const c = p.pat[r][0], col = WALL[r].indexOf(c);
      simWall[r][col] = true;
      sc += wallPtsFor(simWall, r, col);
    }
  }

  // 2. Floor penalty (exact, based on current floor contents)
  for (let i=0; i<Math.min(p.floor.length, FLOOR_PEN.length); i++) sc += FLOOR_PEN[i];
  sc = Math.max(0, sc);

  // 3. Partial pattern line credit (closer to completion = more valuable)
  for (let r=0;r<5;r++) {
    const len = p.pat[r].length, max = r+1;
    if (len > 0 && len < max) {
      // Value: how close are we? weighted by expected points from that wall position
      const color = p.pat[r][0], col = WALL[r].indexOf(color);
      const expectedPts = wallPtsFor(simWall, r, col);
      const progress = len / max;
      sc += progress * progress * expectedPts * 0.8; // diminishing returns
    }
  }

  // 4. Wall bonus potential (end-game bonuses)
  // Rows: +2 each
  for (let r=0;r<5;r++) {
    const filled = simWall[r].filter(c=>c).length;
    if (filled === 5) sc += 2; // already complete
    else if (filled >= 3) sc += (filled / 5) * (filled / 5) * 2;
  }
  // Columns: +7 each (much more valuable)
  for (let c=0;c<5;c++) {
    let filled=0;
    for (let r=0;r<5;r++) if(simWall[r][c]) filled++;
    if (filled === 5) sc += 7;
    else if (filled >= 3) sc += (filled / 5) * (filled / 5) * 7;
  }
  // Colors: +10 each
  for (const col of COLORS) {
    let n=0;
    for (let r=0;r<5;r++) { const c=WALL[r].indexOf(col); if(simWall[r][c]) n++; }
    if (n === 5) sc += 10;
    else if (n >= 3) sc += (n / 5) * (n / 5) * 10;
  }

  // 5. Adjacency cluster value: tiles next to many neighbors are more valuable for future
  for (let r=0;r<5;r++) for (let c=0;c<5;c++) {
    if (!simWall[r][c]) continue;
    let adj=0;
    if(r>0&&simWall[r-1][c]) adj++;
    if(r<4&&simWall[r+1][c]) adj++;
    if(c>0&&simWall[r][c-1]) adj++;
    if(c<4&&simWall[r][c+1]) adj++;
    sc += adj * 0.3; // small bonus per adjacency (future tiles placed here score more)
  }

  return sc;
}

// ========== EASY: Original greedy (with slight randomization) ==========
function pickEasy(moves) {
  // Score each move with the simple heuristic + small random jitter for variety
  let best=moves[0], bs=-Infinity;
  for (const m of moves) {
    let sc;
    if(m.row===-1) { sc = -m.count*2 - (m.src==='c'&&S.ctrFirst?1:0); }
    else {
      const p=S.players[S.cur], line=p.pat[m.row], max=m.row+1;
      const space=max-line.length, placed=Math.min(m.count,space), overflow=m.count-placed;
      if(line.length+placed===max) {
        const col=WALL[m.row].indexOf(m.color);
        sc = wallPtsFor(p.wall, m.row, col) * 3;
        if(p.wall[m.row].filter(c=>c).length===4) sc+=5;
      } else sc = placed;
      sc -= overflow*2;
      if(m.src==='c'&&S.ctrFirst) sc-=1;
    }
    sc += (Math.random() - 0.5) * 1.5; // jitter so it doesn't play identically each game
    if(sc>bs){bs=sc;best=m;}
  }
  return best;
}

// ========== MEDIUM: Enhanced heuristic evaluation ==========
function pickMedium(moves) {
  let best=moves[0], bs=-Infinity;
  for (const m of moves) {
    const sim = cloneState(S);
    execMove(sim, S.cur, m);
    const myVal = evalPosition(sim, S.cur);
    // Factor in what we're giving opponents via center dump
    let oppAvg = 0;
    for (let i=0;i<sim.players.length;i++) { if (i!==S.cur) oppAvg += evalPosition(sim, i); }
    oppAvg /= Math.max(1, sim.players.length - 1);
    const sc = myVal - oppAvg * 0.3; // weight opponents lightly
    if(sc>bs){bs=sc;best=m;}
  }
  return best;
}

// ========== HARD: 1-ply minimax (consider opponent's best response) ==========
function pickHard(moves) {
  let best=moves[0], bs=-Infinity;
  const nextPi = (S.cur + 1) % CFG.np;
  for (const m of moves) {
    const sim = cloneState(S);
    execMove(sim, S.cur, m);

    // Check if round would end after this move
    const roundOver = sim.fac.every(f=>!f.length) && !sim.ctr.length;
    let sc;
    if (roundOver) {
      // Evaluate end-of-round position directly
      sc = evalPosition(sim, S.cur);
      for (let i=0;i<sim.players.length;i++) { if(i!==S.cur) sc -= evalPosition(sim,i)*0.35; }
    } else {
      // Simulate opponent's best response
      const oppMoves = enumerateMoves(sim, nextPi);
      let worstCase = Infinity;
      if (!oppMoves.length) {
        worstCase = evalPosition(sim, S.cur);
      } else {
        // Sample top moves if too many (cap at 15 for speed)
        const candidates = oppMoves.length > 15 ? prefilterMoves(sim, nextPi, oppMoves, 15) : oppMoves;
        for (const om of candidates) {
          const sim2 = cloneState(sim);
          execMove(sim2, nextPi, om);
          const myVal = evalPosition(sim2, S.cur);
          const oppVal = evalPosition(sim2, nextPi);
          const val = myVal - oppVal * 0.5;
          if (val < worstCase) worstCase = val;
        }
      }
      sc = worstCase;
    }
    if(sc>bs){bs=sc;best=m;}
  }
  return best;
}

// Quick prefilter: score all opponent moves with medium eval, keep top N
function prefilterMoves(state, pi, moves, n) {
  const scored = moves.map(m => {
    const sim = cloneState(state);
    execMove(sim, pi, m);
    return { m, sc: evalPosition(sim, pi) };
  });
  scored.sort((a,b) => b.sc - a.sc);
  return scored.slice(0, n).map(s => s.m);
}

// ============ RENDER ============
function render() {
  renderFactories();
  renderBoards();
}

function renderFactories() {
  const area = document.getElementById('factories-area');
  area.innerHTML = '';
  const canP = S.phase==='pick' && !S.players[S.cur].isAI && !S.over;

  for (let i = 0; i < S.fac.length; i++) {
    const d = document.createElement('div');
    const hasTiles = S.fac[i].length > 0;
    d.className = 'factory' + (canP && hasTiles ? ' glow' : '') + (!hasTiles ? ' empty' : '');
    d.setAttribute('data-num', i + 1);
    for (const tile of S.fac[i]) {
      const t = document.createElement('div');
      t.className = `t t-${tile}`;
      if (canP) t.onclick = () => pickTiles('factory', i, tile);
      d.appendChild(t);
    }
    area.appendChild(d);
  }

  const ctr = document.createElement('div');
  ctr.id = 'center-pool';
  if (canP && (S.ctr.length || S.ctrFirst)) ctr.classList.add('glow');
  if (S.ctrFirst) {
    const ft = document.createElement('div');
    ft.className = 't t-first';
    ft.textContent = '1st';
    ctr.appendChild(ft);
  }
  for (const tile of S.ctr) {
    const t = document.createElement('div');
    t.className = `t t-${tile}`;
    if (canP) t.onclick = () => pickTiles('center', -1, tile);
    ctr.appendChild(t);
  }
  area.appendChild(ctr);
}

function renderBoards() {
  const boards = document.getElementById('boards');
  boards.innerHTML = '';
  const placing = S.phase === 'place' && sel;

  for (let pi = 0; pi < S.players.length; pi++) {
    const p = S.players[pi];
    const isCur = pi === S.cur;
    const board = document.createElement('div');
    board.className = 'player-board' + (isCur ? ' active' : ' inactive');

    // Header
    const hdr = document.createElement('div');
    hdr.className = 'player-header';
    const nm = document.createElement('span');
    nm.className = 'player-name';
    nm.innerHTML = (isCur && !S.over ? '<span class="turn-dot"></span>' : '') + p.name + (p.isAI?' <span style="font-size:11px;color:#888">(AI)</span>':'');
    const sc = document.createElement('span');
    sc.className = 'player-score';
    sc.textContent = p.score;
    hdr.appendChild(nm);
    hdr.appendChild(sc);
    board.appendChild(hdr);

    const content = document.createElement('div');
    content.className = 'board-content';

    // Pattern lines
    const patDiv = document.createElement('div');
    patDiv.className = 'pattern-lines';

    for (let r = 0; r < 5; r++) {
      const rowDiv = document.createElement('div');
      rowDiv.className = 'p-row';
      const max = r + 1, line = p.pat[r];

      let canPlace = false;
      if (placing && isCur) {
        const wc = WALL[r].indexOf(sel.color);
        canPlace = !p.wall[r][wc] && (line.length === 0 || line[0] === sel.color) && line.length < max;
        rowDiv.classList.add(canPlace ? 'can-place' : 'cant-place');
        if (canPlace) rowDiv.onclick = () => placeTiles(r);
      }

      for (let s = max - 1; s >= 0; s--) {
        const slot = document.createElement('div');
        slot.className = 'p-slot';
        if (s < line.length) {
          slot.classList.add('filled');
          const t = document.createElement('div');
          t.className = `t t-${line[s]}`;
          slot.appendChild(t);
        } else if (canPlace && s < line.length + sel.count && s < max) {
          // Preview
          slot.classList.add('preview');
          const t = document.createElement('div');
          t.className = `t t-${sel.color}`;
          t.style.opacity = '0.5';
          t.style.width = '100%';
          t.style.height = '100%';
          slot.appendChild(t);
        }
        rowDiv.appendChild(slot);
      }
      patDiv.appendChild(rowDiv);
    }
    content.appendChild(patDiv);

    // Arrows
    const arrowDiv = document.createElement('div');
    arrowDiv.className = 'arrow-col';
    for (let r = 0; r < 5; r++) {
      const sp = document.createElement('span');
      sp.textContent = '\u2192';
      if (p.pat[r].length === r + 1) sp.classList.add('ready');
      arrowDiv.appendChild(sp);
    }
    content.appendChild(arrowDiv);

    // Wall
    const wallDiv = document.createElement('div');
    wallDiv.className = 'wall';
    for (let r = 0; r < 5; r++) {
      const rowDiv = document.createElement('div');
      rowDiv.className = 'wall-row';
      for (let c = 0; c < 5; c++) {
        const slot = document.createElement('div');
        const color = WALL[r][c];
        slot.className = `w-slot w-${color}`;
        if (p.wall[r][c]) {
          slot.classList.add('placed');
          const t = document.createElement('div');
          t.className = `t t-${color}`;
          slot.appendChild(t);
        }
        rowDiv.appendChild(slot);
      }
      wallDiv.appendChild(rowDiv);
    }
    content.appendChild(wallDiv);
    board.appendChild(content);

    // Floor
    const floorArea = document.createElement('div');
    floorArea.className = 'floor-area';

    const floorHdr = document.createElement('div');
    floorHdr.className = 'floor-header';
    const floorLbl = document.createElement('span');
    floorLbl.className = 'floor-label';
    floorLbl.textContent = 'Floor Line';
    floorHdr.appendChild(floorLbl);
    const floorClick = document.createElement('span');
    floorClick.className = 'floor-click';
    if (placing && isCur) {
      floorClick.textContent = 'Click to discard tiles here';
      floorClick.style.display = 'inline';
      floorClick.onclick = () => placeTiles(-1);
    }
    floorHdr.appendChild(floorClick);
    floorArea.appendChild(floorHdr);

    const penRow = document.createElement('div');
    penRow.className = 'floor-penalties';
    for (let i=0;i<7;i++) { const sp=document.createElement('span'); sp.textContent=FLOOR_PEN[i]; penRow.appendChild(sp); }
    floorArea.appendChild(penRow);

    const floorLine = document.createElement('div');
    floorLine.className = 'floor-line' + (placing && isCur ? ' can-drop' : '');
    if (placing && isCur) floorLine.onclick = () => placeTiles(-1);
    for (let i=0;i<7;i++) {
      const slot = document.createElement('div');
      slot.className = 'floor-slot';
      if (i < p.floor.length) {
        const tc = p.floor[i];
        slot.classList.add('filled');
        const t = document.createElement('div');
        if (tc === 'first') { t.className = 't t-first'; t.textContent = '1st'; }
        else t.className = `t t-${tc}`;
        slot.appendChild(t);
      }
      floorLine.appendChild(slot);
    }
    floorArea.appendChild(floorLine);
    board.appendChild(floorArea);
    boards.appendChild(board);
  }
}

function setStatus(html) { document.getElementById('status').innerHTML = html; }

function showGameOver() {
  Snd.SFX.victory();
  document.getElementById('overlay').classList.add('show');
  const sorted = [...S.players].sort((a,b) => b.score - a.score);
  document.getElementById('winner-text').textContent = `${sorted[0].name} Wins!`;
  const cont = document.getElementById('final-scores');
  cont.innerHTML = '';
  sorted.forEach((p, i) => {
    const row = document.createElement('div');
    row.className = 'score-row';
    row.innerHTML = `<span>${i===0?'\u{1F451} ':''}${p.name}</span><span class="pts">${p.score} pts</span>`;
    cont.appendChild(row);
  });
  // Bonus info
  let info = 'Bonuses: Complete row +2 | Complete column +7 | All 5 of one color +10';
  document.getElementById('bonus-info').textContent = info;
}

// ============ SETUP ============
function selectCard(el, groupId) {
  document.querySelectorAll(`#${groupId} .setup-card`).forEach(c => c.classList.remove('sel'));
  el.classList.add('sel');
  // Show/hide difficulty row based on mode
  if (groupId === 'mode-cards') {
    const isAI = el.dataset.val === 'ai';
    document.getElementById('difficulty-row').style.display = isAI ? 'flex' : 'none';
  }
}

function startGame() {
  gameGen++;
  const np = parseInt(document.querySelector('#player-cards .sel').dataset.val);
  const ai = document.querySelector('#mode-cards .sel').dataset.val === 'ai';
  const difficulty = document.querySelector('#diff-cards .sel').dataset.val;
  document.getElementById('setup').style.display = 'none';
  const ga = document.getElementById('game-area');
  ga.style.display = 'flex'; ga.style.flexDirection = 'column'; ga.style.alignItems = 'center'; ga.style.gap = '14px';

  initState(np, ai, difficulty);
  setStatus(`<span class="step-num">1</span> ${S.players[0].name}, pick tiles from a factory or center`);
  render();
}

function restartGame() {
  // Invalidate any in-flight scoring/AI loops
  gameGen++;
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('round-summary').classList.remove('show');
  document.getElementById('scoring-banner').classList.remove('show');
  document.getElementById('setup').style.display = 'flex';
  document.getElementById('game-area').style.display = 'none';
  document.getElementById('undo-btn').style.display = 'none';
  // Clear any lingering floating overlays
  document.querySelectorAll('.points-pop, .tally-ticker, .line-complete, .chain-overlay, .fly-tile').forEach(el => el.remove());
  sel = null; undoState = null;
}

let tutStep = 0;
function showTutorial() {
  tutStep = 0;
  document.getElementById('tutorial-overlay').classList.add('show');
  renderTut();
}
function renderTut() {
  const t = TUT[tutStep];
  document.getElementById('tut-title').innerHTML = `<span class="tut-step">${tutStep+1}</span> ${t.title}`;
  document.getElementById('tut-body').innerHTML = t.body;
  const dots = document.getElementById('tut-dots');
  dots.innerHTML = '';
  TUT.forEach((_,i) => {
    const d = document.createElement('div');
    d.className = 'tut-dot' + (i===tutStep?' active':'');
    d.onclick = () => { tutStep=i; renderTut(); };
    d.style.cursor = 'pointer';
    dots.appendChild(d);
  });
  document.getElementById('tut-prev').style.visibility = tutStep===0?'hidden':'visible';
  const nextBtn = document.getElementById('tut-next');
  nextBtn.textContent = tutStep===TUT.length-1 ? 'Got it!' : 'Next';
}
function tutNext() {
  if (tutStep < TUT.length-1) { tutStep++; renderTut(); }
  else document.getElementById('tutorial-overlay').classList.remove('show');
}
function tutPrev() {
  if (tutStep > 0) { tutStep--; renderTut(); }
}

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === '?' || (e.key === '/' && e.shiftKey)) showTutorial();
  if (e.key === 'Escape') {
    document.getElementById('tutorial-overlay').classList.remove('show');
  }
  if (e.key === 'z' && (e.ctrlKey || e.metaKey)) undoPick();
});
